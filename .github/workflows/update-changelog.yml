name: Update Changelog and Version

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  update-changelog:
    name: Auto Changelog & Version Bump
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@1e1c8eafbd745f64b1ef30a7d7ed7965034c486c # v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if already run
        id: check_run
        run: |
          event_action="${{ github.event.action }}"
          last_commit_subject=$(git log -n 1 --format="%s")
          
          if [ "$event_action" = "synchronize" ] && [[ "$last_commit_subject" == "chore: update CHANGELOG.md"* ]]; then
            echo "Synchronize event triggered by bot commit. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Event action is $event_action and last commit is '$last_commit_subject'. Proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run update script
        if: steps.check_run.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: npx tsx scripts/update-changelog-ci.ts

      - name: Commit and Push changes
        if: steps.check_run.outputs.skip != 'true'
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: update CHANGELOG.md and bump version"
          git push origin "HEAD:$PR_HEAD_REF"
