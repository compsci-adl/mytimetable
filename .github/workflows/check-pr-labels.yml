name: Check PR Labels

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize]

jobs:
  check-labels:
    name: Verify Release Labels
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Verify PR has release label
        uses: actions/github-script@v7
        with:
          script: |
            const user = context.payload.pull_request.user.login;
            if (user === 'renovate[bot]') {
              console.log('Skipping release label check for Renovate PR.');
              return;
            }

            const labels = context.payload.pull_request.labels.map(l => l.name);
            const validLabels = ['patch', 'minor-update', 'major-update'];
            const matchedLabels = labels.filter(l => validLabels.includes(l));
            
            if (matchedLabels.length === 0) {
              core.setFailed(`PR must have exactly one of the following labels to be merged: ${validLabels.join(', ')}. Currently, none are applied.`);
            } else if (matchedLabels.length > 1) {
              core.setFailed(`PR has multiple release labels: ${matchedLabels.join(', ')}. Only one label from ${validLabels.join(', ')} must be applied.`);
            } else {
              console.log(`Success: Found exactly one release label: ${matchedLabels[0]}`);
            }